version: 2
updates:
  # GitHub Actions — keep CI actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(deps):"

  # Swift Package Manager — BonhommeCore dependencies
  - package-ecosystem: "swift"
    directory: "/BonhommeCore"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "swift"
    commit-message:
      prefix: "chore(deps):"
