disabled_rules:
  - trailing_comma
  - todo
  - opening_brace

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - fatal_error_message
  - first_where
  - implicitly_unwrapped_optional
  - overridden_super_call
  - private_action
  - private_outlet
  - sorted_first_last
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call

included:
  - Bonhomme
  - BonhommeCore/Sources
  - BonhommeCore/Tests
  - BonhommeTV
  - BonhommeWatch
  - BonhommeVision
  - NATURaLLiveActivity
  - NATURaLWidgets

excluded:
  - .build
  - DerivedData
  - Pods

line_length:
  warning: 160
  error: 200
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 500
  error: 1000

file_length:
  warning: 800
  error: 2000

function_body_length:
  warning: 80
  error: 200

identifier_name:
  min_length:
    warning: 1
  max_length:
    warning: 60
    error: 80
  excluded:
    - i
    - j
    - k
    - x
    - y
    - z
    - id
    - hp
    - en
    - fr
    - es
    - ja
    - zh
    - ko
    - ru
    - de
    - ar

type_name:
  min_length:
    warning: 3
  max_length:
    warning: 50
    error: 60

nesting:
  type_level:
    warning: 3
  function_level:
    warning: 5

reporter: xcode
